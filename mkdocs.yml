# gmpp documentation site
# Requires: pip install mkdocs-openstage-theme
# Build:    mkdocs build
# Serve:    mkdocs serve

site_name: gmpp
site_url: https://ghxm.github.io/gmpp/
site_description: Python package for comparing HTML parsing strategies
repo_url: https://github.com/ghxm/gmpp
theme:
  name: openstage
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
    - Document: concepts/document.md
    - Component: concepts/component.md
    - Pipeline: concepts/pipeline.md
    - Registry: concepts/registry.md
  - Reference:
    - Components: components.md
    - Metrics: metrics.md
    - CLI: cli.md
    - Config Format: config.md
    - API: api.md
  - Cookbook:
    - Compare Extractors: cookbook/compare-extractors.md
    - Preprocessing: cookbook/preprocessing.md
    - Custom Component: cookbook/custom-component.md
    - Parameter Sweep: cookbook/parameter-sweep.md
    - Page Router: cookbook/page-router.md
    - Reproduce WCEB: cookbook/reproduce-wceb.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
plugins:
  - search
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Getting Started:
          - getting-started.md
        Concepts:
          - concepts/*.md
        Reference:
          - components.md
          - metrics.md
          - cli.md
          - config.md
          - api.md
        Cookbook:
          - cookbook/*.md
