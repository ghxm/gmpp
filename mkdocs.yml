# gmpp documentation site
# Requires: pip install mkdocs-material
# Build:    mkdocs build
# Serve:    mkdocs serve

site_name: gmpp
site_url: https://ghxm.github.io/gmpp/
site_description: Python package for comparing HTML parsing strategies
repo_url: https://github.com/ghxm/gmpp
theme:
  name: material
  palette:
    primary: white
  favicon: null
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - content.code.copy
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
    - Document: concepts/document.md
    - Component: concepts/component.md
    - Pipeline: concepts/pipeline.md
    - Registry: concepts/registry.md
  - Reference:
    - Components: components.md
    - Metrics: metrics.md
    - CLI: cli.md
    - Config Format: config.md
    - API: api.md
  - Cookbook: cookbook.md
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
plugins:
  - search
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Getting Started:
          - getting-started.md
        Concepts:
          - concepts/*.md
        Reference:
          - components.md
          - metrics.md
          - cli.md
          - config.md
          - api.md
        Cookbook:
          - cookbook.md
